version: "2"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    misspell:
      locale: US
  exclusions:
    rules:
      - path: _test\.go$
        linters:
          - errcheck
      - path: cmd/
        linters:
          - errcheck
      - path: examples/
        linters:
          - errcheck
      - path: benchmarks/
        linters:
          - errcheck
formatters:
  enable:
    - gofmt
    - goimports
run:
  timeout: 5m
