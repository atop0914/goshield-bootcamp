version: "2"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
  settings:
    misspell:
      locale: US
  exclusions:
    rules:
      - linters:
          - errcheck
        paths:
          - _test\\.go$
          - cmd/
          - examples/
          - benchmarks/
formatters:
  enable:
    - gofmt
    - goimports
run:
  timeout: 5m
