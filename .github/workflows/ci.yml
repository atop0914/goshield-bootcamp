name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.22', '1.23', '1.24', '1.25']
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}
      
      - name: Run linter
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
      
      - name: Run tests
        run: go test -short -v -race -count=1 ./...
      
      - name: Run benchmarks
        run: go test -bench=. -benchmem ./... -count=1
  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
      
      - name: Build
        run: |
          go build -ldflags="-s -w" -o goshield ./cmd/goshield
          ls -la goshield
