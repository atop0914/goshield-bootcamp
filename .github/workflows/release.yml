name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'

      - name: Run tests
        run: go test -short -v -race ./...

      - name: Build binaries
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          COMMIT=$(git rev-parse --short HEAD)
          DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          LDFLAGS="-s -w \
            -X github.com/atop0914/goshield/internal/version.Version=$VERSION \
            -X github.com/atop0914/goshield/internal/version.GitCommit=$COMMIT \
            -X github.com/atop0914/goshield/internal/version.BuildDate=$DATE"

          mkdir -p dist

          for GOOS in linux darwin windows; do
            for GOARCH in amd64 arm64; do
              [ "$GOOS" = "windows" ] && [ "$GOARCH" = "arm64" ] && continue
              EXT=""
              [ "$GOOS" = "windows" ] && EXT=".exe"
              OUTPUT="goshield-${GOOS}-${GOARCH}${EXT}"
              echo "Building ${OUTPUT}..."
              GOOS=$GOOS GOARCH=$GOARCH go build -ldflags="$LDFLAGS" -o "dist/${OUTPUT}" ./cmd/goshield
            done
          done

      - name: Generate checksums
        run: cd dist && sha256sum * > checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
